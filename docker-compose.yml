# Local development stack.
#   docker compose up -d db pgadmin   → Postgres + pgAdmin
#   docker compose up --build         → Full stack (Postgres + pgAdmin + Web)

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: softsync
      POSTGRES_USER: softsync
      POSTGRES_PASSWORD: softsync
    ports:
      - "5432:5432"
    volumes:
      - softsync-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U softsync -d softsync"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@softsync.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    volumes:
      - softsync-pgadmin:/var/lib/pgadmin
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: SoftSync.Presentation/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      PORT: "8080"

      # Inside the compose network the DB host is the service name "db".
      ConnectionStrings__SoftSyncDb: "Host=db;Port=5432;Database=softsync;Username=softsync;Password=softsync"

    ports:
      - "8080:8080"

    depends_on:
      db:
        condition: service_healthy

volumes:
  softsync-pgdata:
  softsync-pgadmin: